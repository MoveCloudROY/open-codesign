appId: ai.opencowork.codesign
productName: open-codesign
# Declare the publish target explicitly so electron-builder's updater-info
# machinery (channels, provider, latest.yml) has something non-null to hang
# on — otherwise NSIS packaging crashes with "Cannot read properties of null
# (reading 'provider')" even when we never intend to publish. CI invokes
# electron-builder with `--publish never`, so nothing is actually uploaded.
publish:
  - provider: github
    owner: OpenCoworkAI
    repo: open-codesign
directories:
  buildResources: resources
  output: release
files:
  - out/**
  - package.json
asar: true
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  target:
    - target: dmg
      arch: [arm64, x64]
dmg:
  # Custom window layout guides users to drag the app into /Applications.
  # Running from the DMG mount leaves safeStorage unavailable (the volume
  # is read-only so macOS can't establish a keychain trust entry), which
  # breaks API key save / import. The background, arrow, and in-app boot
  # check (install-check.ts) work together to steer users to the right
  # flow.
  background: build/dmg-background.png
  iconSize: 92
  window:
    width: 640
    height: 480
  contents:
    - x: 140
      y: 240
      type: file
    - x: 500
      y: 240
      type: link
      path: /Applications
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch: [x64]
  category: Graphics
